<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volafly</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A0A; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ── Supabase ──────────────────────────────────────────────────────────
    // 👉 HIER deine Supabase-Werte eintragen:
    const SUPABASE_URL  = 'https://jiycewpqjcvjbykcxaqi.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppeWNld3BxamN2amJ5a2N4YXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDg0NjgsImV4cCI6MjA4OTA4NDQ2OH0._QGScZNrJ0qJbnXFCpJzG5GC2ZufUWbAa_1i2sGJB5w';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    // ─────────────────────────────────────────────────────────────────────

    const { useState, useEffect, useRef } = React;

    // ── Login Screen ──────────────────────────────────────────────────────
    const LoginScreen = ({ onLogin }) => {
      const [mode, setMode]       = useState('login'); // 'login' | 'register'
      const [email, setEmail]     = useState('');
      const [password, setPass]   = useState('');
      const [error, setError]     = useState('');
      const [loading, setLoading] = useState(false);

      const handleAuth = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true);
        try {
          let res;
          if (mode === 'login') {
            res = await sb.auth.signInWithPassword({ email, password });
          } else {
            res = await sb.auth.signUp({ email, password });
            if (!res.error && res.data.user && !res.data.session) {
              setError('Bestätigungsmail gesendet — bitte E-Mail prüfen.');
              setLoading(false); return;
            }
          }
          if (res.error) throw res.error;
          onLogin(res.data.user);
        } catch (err) {
          setError(err.message || 'Fehler bei der Anmeldung');
        }
        setLoading(false);
      };

      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: '#0A0A0A',
          backgroundImage: 'radial-gradient(ellipse at 20% 20%, rgba(10,132,255,0.07) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(191,90,242,0.05) 0%, transparent 50%)',
          fontFamily: '-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif',
        }}>
          <div style={{ width: '100%', maxWidth: '360px', padding: '0 24px' }}>

            {/* Logo */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '36px', justifyContent: 'center' }}>
              <svg width="32" height="40" viewBox="0 0 140 170" fill="none">
                <line x1="10" y1="4" x2="70" y2="88" stroke="#F5F5F7" strokeWidth="12" strokeLinecap="round"/>
                <line x1="130" y1="4" x2="70" y2="88" stroke="#F5F5F7" strokeWidth="12" strokeLinecap="round"/>
                <rect x="61" y="88" width="18" height="18" rx="3" fill="#F5F5F7"/>
                <line x1="70" y1="106" x2="70" y2="160" stroke="#F5F5F7" strokeWidth="12" strokeLinecap="round"/>
                <line x1="70" y1="160" x2="24" y2="160" stroke="#F5F5F7" strokeWidth="12" strokeLinecap="round"/>
                <line x1="70" y1="160" x2="116" y2="160" stroke="#F5F5F7" strokeWidth="12" strokeLinecap="round"/>
                <line x1="70" y1="133" x2="110" y2="133" stroke="#F5F5F7" strokeWidth="12" strokeLinecap="round"/>
                <rect x="4" y="0" width="132" height="9" rx="3" fill="#F5F5F7" opacity="0.7"/>
                <rect x="16" y="159" width="108" height="9" rx="3" fill="#F5F5F7" opacity="0.7"/>
              </svg>
              <div>
                <div style={{ fontSize: '22px', fontWeight: 700, color: '#F5F5F7', letterSpacing: '-0.02em', lineHeight: 1 }}>Volafly</div>
                <div style={{ fontSize: '10px', color: 'rgba(255,255,255,0.3)', letterSpacing: '0.04em' }}>Volatilität lesen. On the fly.</div>
              </div>
            </div>

            {/* Card */}
            <div style={{ background: 'rgba(255,255,255,0.04)', border: '0.5px solid rgba(255,255,255,0.09)', borderRadius: '20px', padding: '28px' }}>

              {/* Tab toggle */}
              <div style={{ display: 'flex', background: 'rgba(255,255,255,0.06)', borderRadius: '12px', padding: '3px', marginBottom: '24px' }}>
                {['login','register'].map(m => (
                  <button key={m} onClick={() => { setMode(m); setError(''); }}
                    style={{ flex: 1, padding: '7px', borderRadius: '10px', border: 'none', cursor: 'pointer', fontSize: '12px', fontWeight: 600,
                      background: mode === m ? 'rgba(255,255,255,0.12)' : 'transparent',
                      color: mode === m ? '#F5F5F7' : 'rgba(255,255,255,0.35)',
                      transition: 'all 0.2s',
                    }}>
                    {m === 'login' ? 'Anmelden' : 'Registrieren'}
                  </button>
                ))}
              </div>

              <form onSubmit={handleAuth}>
                {/* E-Mail */}
                <div style={{ marginBottom: '12px' }}>
                  <label style={{ fontSize: '10px', fontWeight: 600, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.06em', textTransform: 'uppercase', display: 'block', marginBottom: '6px' }}>E-Mail</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                    style={{ width: '100%', padding: '10px 12px', background: 'rgba(255,255,255,0.06)', border: '0.5px solid rgba(255,255,255,0.1)', borderRadius: '10px', color: '#F5F5F7', fontSize: '14px', outline: 'none', fontFamily: 'inherit' }}
                    onFocus={e => e.target.style.borderColor='rgba(10,132,255,0.5)'}
                    onBlur={e => e.target.style.borderColor='rgba(255,255,255,0.1)'}
                    placeholder="du@beispiel.de"
                  />
                </div>

                {/* Passwort */}
                <div style={{ marginBottom: '20px' }}>
                  <label style={{ fontSize: '10px', fontWeight: 600, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.06em', textTransform: 'uppercase', display: 'block', marginBottom: '6px' }}>Passwort</label>
                  <input type="password" value={password} onChange={e => setPass(e.target.value)} required minLength={6}
                    style={{ width: '100%', padding: '10px 12px', background: 'rgba(255,255,255,0.06)', border: '0.5px solid rgba(255,255,255,0.1)', borderRadius: '10px', color: '#F5F5F7', fontSize: '14px', outline: 'none', fontFamily: 'inherit' }}
                    onFocus={e => e.target.style.borderColor='rgba(10,132,255,0.5)'}
                    onBlur={e => e.target.style.borderColor='rgba(255,255,255,0.1)'}
                    placeholder="Mindestens 6 Zeichen"
                  />
                </div>

                {error && (
                  <div style={{ marginBottom: '16px', padding: '10px 12px', borderRadius: '10px', background: error.includes('gesendet') ? 'rgba(48,209,88,0.08)' : 'rgba(255,69,58,0.08)', border: `0.5px solid ${error.includes('gesendet') ? 'rgba(48,209,88,0.2)' : 'rgba(255,69,58,0.2)'}`, fontSize: '12px', color: error.includes('gesendet') ? '#30D158' : '#FF453A', lineHeight: 1.4 }}>
                    {error}
                  </div>
                )}

                <button type="submit" disabled={loading}
                  style={{ width: '100%', padding: '11px', borderRadius: '12px', border: 'none', cursor: loading ? 'wait' : 'pointer', background: '#0A84FF', color: '#fff', fontSize: '14px', fontWeight: 600, marginBottom: '12px', opacity: loading ? 0.7 : 1, transition: 'opacity 0.2s', fontFamily: 'inherit' }}>
                  {loading ? '…' : mode === 'login' ? 'Anmelden' : 'Konto erstellen'}
                </button>
              </form>

            </div>
          </div>
        </div>
      );
    };

    // ── App Wrapper mit Auth ───────────────────────────────────────────────
    const App = () => {
      const [user, setUser]       = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      useEffect(() => {
        // Session prüfen beim Start
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthLoading(false);
        });
        // Auth-State-Änderungen lauschen (z.B. nach Google OAuth Redirect)
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      if (authLoading) return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0A0A0A' }}>
          <div className="spin" style={{ width: '24px', height: '24px', border: '2px solid rgba(255,255,255,0.1)', borderTopColor: '#0A84FF', borderRadius: '50%' }}/>
        </div>
      );

      if (!user) return <LoginScreen onLogin={setUser} />;
      return <MarketPivot user={user} supabase={sb} />;
    };



const MarketPivot = ({ user, supabase: sbClient }) => {
  const [activeTab, setActiveTab] = useState('data');
  const [showConfig, setShowConfig] = useState(false);

  // ── Editable Thresholds Config ──
  // range: [min, max] allowed for each indicator's thresholds
  const defaultThresholds = {
    vix:          { label: 'VIX',             values: [15, 20, 30, 40],         dir: 'asc',  range: [0, 100] },
    vvix:         { label: 'VVIX',            values: [85, 100, 120, 140],      dir: 'asc',  range: [0, 250] },
    vixVxv:       { label: 'VIX/VXV',         values: [0.85, 0.95, 1.00, 1.10], dir: 'asc',  range: [0.3, 2.0] },
    vxn:          { label: 'VXN',             values: [18, 23, 33, 43],         dir: 'asc',  range: [0, 100] },
    rvx:          { label: 'RVX',             values: [18, 23, 30, 40],         dir: 'asc',  range: [0, 100] },
    fearGreed:    { label: 'Fear & Greed',    values: [75, 55, 35, 20],         dir: 'desc', range: [0, 100] },
    equityPutCall:{ label: 'Equity P/C',      values: [0.60, 0.75, 0.95, 1.10], dir: 'asc',  range: [0, 3.0] },
    vx1Spread:    { label: 'VX1 – VIX Spot',  values: [2.0, 0.5, -0.5, -2.0],  dir: 'desc', range: [-15, 15] },
    vx2Spread:    { label: 'VX2 – VX1',       values: [1.0, 0.3, -0.3, -1.0],  dir: 'desc', range: [-10, 10] },
    // ── Neue Indikatoren ──
    // HY Spread: Allzeittief 2,41% (2007), GFC-Peak 21,82% (2008), COVID-Peak 10,87% (2020)
    hySpread:     { label: 'HY Credit Spread', values: [3.0, 4.0, 5.5, 8.0],   dir: 'asc',  range: [0, 25] },
    // DXY: COVID-Spike 103, 2022 Fed-Peak 114,78 — hoher DXY = Risk-Off = höhere Klasse
    dxy:          { label: 'DXY',              values: [94, 99, 104, 109],       dir: 'asc',  range: [70, 130] },
    // Gold/SP: 2021 Bull-Peak 0,37 — COVID-Panik 0,65 — GFC 1,14
    goldSP:       { label: 'Gold/S&P',         values: [0.35, 0.45, 0.55, 0.70], dir: 'asc',  range: [0.1, 2.0] },
  };
  const [thresholds, setThresholds] = useState(defaultThresholds);
  const [draftThresholds, setDraftThresholds] = useState(defaultThresholds);
  const [tooltipKey, setTooltipKey] = useState(null);
  const [validationErrors, setValidationErrors] = useState({});
  // Raw text per input cell so users can freely type commas
  const [inputTexts, setInputTexts] = useState({});

  const getInputText = (key, vi, fallback) => {
    const k = `${key}-${vi}`;
    return k in inputTexts ? inputTexts[k] : String(fallback).replace('.', ',');
  };

  // Validate a single indicator row
  const validateRow = (key, cfg) => {
    const vals = cfg.values;
    const [min, max] = cfg.range;
    if (vals.some(v2 => v2 < min || v2 > max)) {
      return `${cfg.label}: Werte müssen zwischen ${String(min).replace('.', ',')} und ${String(max).replace('.', ',')} liegen`;
    }
    if (cfg.dir === 'asc') {
      for (let i = 1; i < vals.length; i++) {
        if (vals[i] <= vals[i - 1]) return `${cfg.label}: Werte müssen strikt aufsteigend sein`;
      }
    } else {
      for (let i = 1; i < vals.length; i++) {
        if (vals[i] >= vals[i - 1]) return `${cfg.label}: Werte müssen strikt absteigend sein`;
      }
    }
    return null;
  };

  // Validate all rows and update errors state
  const validateAll = (draft) => {
    const errors = {};
    Object.entries(draft).forEach(([key, cfg]) => {
      const err = validateRow(key, cfg);
      if (err) errors[key] = err;
    });
    setValidationErrors(errors);
    return Object.keys(errors).length === 0;
  };
  const [marketData, setMarketData] = useState({
    volatilityMetrics: {
      rvx: 19.8, vxn: 19.49, vix: 15.06, vvix: 102.15, vxv: 18.02,
      fearGreed: 45, equityPutCall: 0.68, totalPutCall: 0.92,
      skewIndex: 143.78, moveIndex: 61.35, leftTailVol: 22.1,
      vx1: 16.8, vx2: 17.3, vx3: 17.9, vx4: 18.4, vx5: 18.8
    },
    yieldCurve: { y2: 4.17, y10: 4.165, y30: 4.56 },
    movingAverages: { breadth: { above5day: 52.4, above20day: 64.6, above50day: 68.2, above200day: 60.0 } },
    riskIndicators: { hySpread: 3.45, dxy: 104.2, goldSP: 0.52 }
  });
  const [csvStatus, setCsvStatus] = useState(null);
  const [showTemplate, setShowTemplate] = useState(false);
  const [copySuccess, setCopySuccess] = useState(false);
  const [lastImportDate, setLastImportDate] = useState(null);
  const [dataTooltip, setDataTooltip] = useState(null);

  // ── Profil-Management ──
  const [profiles, setProfiles]             = useState([]);
  const [activeProfileId, setActiveProfileId] = useState(null);
  const [showProfilePanel, setShowProfilePanel] = useState(false);
  const [newProfileName, setNewProfileName] = useState('');
  const [profileLoading, setProfileLoading] = useState(false);
  const [profileMsg, setProfileMsg]         = useState(null);
  const [editingProfileId, setEditingProfileId] = useState(null);

  // Profile laden beim Mount
  useEffect(() => {
    if (!sbClient || !user) return;
    loadProfiles();
  }, []);

  const loadProfiles = async () => {
    const { data, error } = await sbClient
      .from('threshold_profiles')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error && data && data.length > 0) {
      setProfiles(data);
      const defaultProfile = data.find(p => p.is_default) || data[0];
      // Merge: alte Profile haben neue Keys noch nicht — mit defaultThresholds auffüllen
      const merged = { ...defaultThresholds, ...defaultProfile.thresholds };
      setThresholds(merged);
      setActiveProfileId(defaultProfile.id);
    }
  };

  const saveProfile = async () => {
    if (!newProfileName.trim()) return;
    setProfileLoading(true);
    // Wenn wir ein bestehendes Konfiguration aktualisieren
    if (editingProfileId) {
      const { data, error } = await sbClient
        .from('threshold_profiles')
        .update({ name: newProfileName.trim(), thresholds })
        .eq('id', editingProfileId)
        .select()
        .single();
      if (!error && data) {
        setProfiles(prev => prev.map(p => p.id === editingProfileId ? data : p));
        setActiveProfileId(data.id);
        setEditingProfileId(null);
        setNewProfileName('');
        setProfileMsg({ type: 'success', text: `„${data.name}" aktualisiert` });
      } else {
        setProfileMsg({ type: 'error', text: 'Fehler beim Aktualisieren' });
      }
    } else {
      // Neues Profil anlegen — erstes Profil wird automatisch Standard
      const isFirst = profiles.length === 0;
      const { data, error } = await sbClient
        .from('threshold_profiles')
        .insert({ user_id: user.id, name: newProfileName.trim(), thresholds, is_default: isFirst })
        .select()
        .single();
      if (!error && data) {
        setProfiles(prev => [data, ...prev]);
        setActiveProfileId(data.id);
        setNewProfileName('');
        setProfileMsg({ type: 'success', text: `„${data.name}" gespeichert` });
      } else {
        setProfileMsg({ type: 'error', text: 'Fehler beim Speichern' });
      }
    }
    setProfileLoading(false);
    setTimeout(() => setProfileMsg(null), 3000);
  };

  const setDefaultProfile = async (id) => {
    // Erst alle auf false setzen, dann nur das gewählte auf true — atomar über RPC vermieden,
    // aber sequenziell sicher da wir danach den State komplett neu setzen
    await sbClient.from('threshold_profiles')
      .update({ is_default: false })
      .eq('user_id', user.id);
    const { error } = await sbClient.from('threshold_profiles')
      .update({ is_default: true })
      .eq('id', id);
    if (!error) {
      // State komplett neu laden — kein partielles Update das zu doppeltem Standard führt
      await loadProfiles();
      setProfileMsg({ type: 'success', text: 'Standard-Konfiguration gesetzt' });
      setTimeout(() => setProfileMsg(null), 3000);
    }
  };

  const loadProfile = (profile) => {
    const merged = { ...defaultThresholds, ...profile.thresholds };
    setThresholds(merged);
    setActiveProfileId(profile.id);
    closeProfilePanel();
  };

  const startEditProfile = (p) => {
    setEditingProfileId(p.id);
    setNewProfileName(p.name);
  };

  const cancelEdit = () => {
    setEditingProfileId(null);
    setNewProfileName('');
  };

  const deleteProfile = async (id, name) => {
    if (!window.confirm(`„${name}" wirklich löschen?`)) return;
    const { error } = await sbClient.from('threshold_profiles').delete().eq('id', id);
    if (!error) {
      setProfiles(prev => prev.filter(p => p.id !== id));
      if (activeProfileId === id) setActiveProfileId(null);
      if (editingProfileId === id) { setEditingProfileId(null); setNewProfileName(''); }
      setProfileMsg({ type: 'success', text: `„${name}" gelöscht` });
      setTimeout(() => setProfileMsg(null), 3000);
    }
  };

  const closeProfilePanel = () => {
    setShowProfilePanel(false);
    setEditingProfileId(null);
    setNewProfileName('');
    setProfileMsg(null);
  };

  const signOut = async () => { await sbClient.auth.signOut(); };

  // ── Data-page tooltip descriptions ──
  const TOOLTIPS = {
    fearGreed:    { label: 'Fear & Greed Index', desc: 'CNN Money Index (0–100). Aggregiert 7 Sentiment-Indikatoren. <25 = Extreme Fear (antizyklisch bullisch), >75 = Extreme Greed (Vorsicht).' },
    equityPC:     { label: 'Equity Put/Call Ratio', desc: 'Verhältnis gekaufter Puts zu Calls auf Einzelaktien. <0,7 = bullische Stimmung, >1,0 = Angst / erhöhte Absicherungsnachfrage.' },
    totalPC:      { label: 'Total Put/Call Ratio', desc: 'Put/Call inkl. Index-Optionen. Höhere Basis als Equity P/C. >1,2 = deutliche Risikoaversion am Markt.' },
    y2:           { label: '2Y Treasury Yield', desc: 'US-Staatsanleihe 2 Jahre. Reagiert stark auf Fed-Erwartungen. Steigt bei erwarteten Zinserhöhungen.' },
    y10:          { label: '10Y Treasury Yield', desc: 'Benchmark für langfristige US-Zinsen. Beeinflusst Hypotheken, Unternehmensanleihen und Aktienbewertungen (DCF-Abzinsungssatz).' },
    y30:          { label: '30Y Treasury Yield', desc: 'Langfristiger US-Zins. Wichtig für Pensionsfonds und Versicherungen. Zeigt langfristige Inflationserwartungen.' },
    vix:          { label: 'VIX — CBOE Volatility Index', desc: 'Implizite 30-Tage-Volatilität des S&P 500. „Angstbarometer" des Marktes. Historischer Schnitt ~20. >30 = erhöhter Stress, >40 = Panik.' },
    rvx:          { label: 'RVX — Russell 2000 Vola', desc: 'Implizite Volatilität des Russell 2000 (Small Caps). Small Caps reagieren stärker auf Rezessionsängste. RVX > VIX = Small-Cap-Stress.' },
    vxn:          { label: 'VXN — Nasdaq 100 Vola', desc: 'Implizite Volatilität des Nasdaq 100. Technologielastig — reagiert stark auf Zinsänderungen und Wachstumserwartungen.' },
    vvix:         { label: 'VVIX — Volatility of VIX', desc: 'Misst die Schwankungsgeschwindigkeit des VIX selbst. >100 = VIX-Bewegungen werden erwartet. Früher Indikator für bevorstehende Volatilitätsspikes.' },
    vixVxv:       { label: 'VIX / VXV Ratio', desc: 'Verhältnis 1-Monats- zu 3-Monats-Volatilität. <1 = normale Termstruktur (Contango). >1 = Inversion / Backwardation — kurzfristiger Stress höher als langfristiger.' },
    skew:         { label: 'SKEW Index', desc: 'Misst die Nachfrage nach OTM-Puts vs. OTM-Calls auf den S&P 500. >130 = erhöhtes Tail-Risk / Crash-Absicherung. Historisch normal: 100–130.' },
    move:         { label: 'MOVE Index', desc: 'Anleihe-Äquivalent des VIX (Merrill Lynch Option Volatility Estimate). Misst implizite Volatilität von US-Treasuries. Hohe Werte = Zinsunsicherheit.' },
    leftTail:     { label: 'Left Tail Volatility', desc: 'Implizite Volatilität tief OTM S&P-Puts (Crash-Schutz). Zeigt, wie teuer Versicherung gegen starke Marktrückgänge ist.' },
    breadth5:     { label: 'S&P 500 Breadth 5D', desc: '% der S&P-500-Aktien über ihrem 5-Tage-Durchschnitt. Kurzfristiger Momentum-Indikator. <30% = kurzfristig überverkauft.' },
    breadth20:    { label: 'S&P 500 Breadth 20D', desc: '% der S&P-500-Aktien über ihrem 20-Tage-Durchschnitt. Mittelfristiger Trendindikator. <40% = breite Schwäche im Markt.' },
    breadth50:    { label: 'S&P 500 Breadth 50D', desc: '% der S&P-500-Aktien über ihrem 50-Tage-Durchschnitt. Zeigt mittelfristige Marktbreite. <50% = mehr als die Hälfte im Abwärtstrend.' },
    breadth200:   { label: 'S&P 500 Breadth 200D', desc: '% der S&P-500-Aktien über ihrem 200-Tage-Durchschnitt. Langfristiger Trendindikator. <40% = strukturelle Bärenmarkt-Signale.' },
    termStructure:{ label: 'VIX Term Structure', desc: 'Zeigt die implizite Volatilität über VX-Futures-Laufzeiten. Contango (aufsteigend) = normal. Backwardation (absteigend) = kurzfristiger Stress erhöht.' },

  // ── CSV Template (Original 2-column format: Metric;Value) ──
  const templateContent = `Metric;Value
RVX;${String(marketData.volatilityMetrics.rvx).replace('.', ',')}
VXN;${String(marketData.volatilityMetrics.vxn).replace('.', ',')}
VIX;${String(marketData.volatilityMetrics.vix).replace('.', ',')}

  const copyToClipboard = async () => {

        return;
      } catch (err) { /* fallback below */ }
    }
    const textArea = document.createElement('textarea');
    textArea.value = templateContent;
    textArea.style.position = 'fixed';
    textArea.style.left = '-999999px';
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      const successful = document.execCommand('copy');
      textArea.remove();
      if (successful) { setCopySuccess(true); setTimeout(() => setCopySuccess(false), 3000); }

  const handleFileUpload = (event) => {
    const file = event.target.files[0];
    if (!file) return;

    // Dateiformat prüfen
    if (!file.name.match(/\.(csv|txt)$/i)) {
      setCsvStatus({ type: 'error', msg: 'Ungültiges Format — bitte eine .csv oder .txt Datei hochladen' });
      setTimeout(() => setCsvStatus(null), 4000);
      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        const lines = text.split(/\r?\n/);

        // Mindest-Struktur prüfen: Header-Zeile muss existieren
        if (lines.length < 2) {
          setCsvStatus({ type: 'error', msg: 'CSV ist leer oder hat kein gültiges Format' });
          setTimeout(() => setCsvStatus(null), 4000);
          event.target.value = ''; return;
        }

        const header = lines[0].replace(/^["']|["']$/g, '').toLowerCase();
        if (!header.includes(';')) {
          setCsvStatus({ type: 'error', msg: 'Falsches Trennzeichen — bitte Semikolon (;) als Trennzeichen verwenden' });
          setTimeout(() => setCsvStatus(null), 4000);
          event.target.value = ''; return;
        }

        const data = {};
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim().replace(/^["']|["']$/g, '');
          if (!line) continue;
          const parts = line.split(';');
          if (parts.length >= 2) {
            const metric = parts[0].trim().replace(/^["']|["']$/g, '');
            const valueStr = parts[1].trim().replace(/^["']|["']$/g, '').replace(',', '.');
            const value = parseFloat(valueStr);
            if (!isNaN(value)) data[metric] = value;
          }
        }

          'VX1','VX2','VX3','VX4','VX5','Yield_2Y','Yield_10Y','Yield_30Y',
          'S5FD_Above_5Day_MA','S5TW_Above_20Day_MA','S5FI_Above_50Day_MA','S5TH_Above_200Day_MA',
          'HY_Spread','DXY','Gold_SP_Ratio'];
        const foundFields = knownFields.filter(k => data[k] !== undefined);
        if (foundFields.length === 0) {
          setCsvStatus({ type: 'error', msg: 'Keine bekannten Felder gefunden — bitte das Template als Vorlage verwenden' });
          setTimeout(() => setCsvStatus(null), 5000);
          event.target.value = ''; return;
        }

        const newData = {
          volatilityMetrics: {
            rvx: data.RVX ?? marketData.volatilityMetrics.rvx,
            vxn: data.VXN ?? marketData.volatilityMetrics.vxn,
            vix: data.VIX ?? marketData.volatilityMetrics.vix,
            vvix: data.VVIX ?? marketData.volatilityMetrics.vvix,

            skewIndex: data.SKEW_Index ?? marketData.volatilityMetrics.skewIndex,
            moveIndex: data.MOVE_Index ?? marketData.volatilityMetrics.moveIndex,
            leftTailVol: data.Left_Tail_Volatility ?? marketData.volatilityMetrics.leftTailVol,
            vx1: data.VX1 ?? marketData.volatilityMetrics.vx1,
            vx2: data.VX2 ?? marketData.volatilityMetrics.vx2,
            vx3: data.VX3 ?? marketData.volatilityMetrics.vx3,
            vx4: data.VX4 ?? marketData.volatilityMetrics.vx4,
            vx5: data.VX5 ?? marketData.volatilityMetrics.vx5,

            y10: data.Yield_10Y ?? marketData.yieldCurve.y10,
            y30: data.Yield_30Y ?? marketData.yieldCurve.y30,

            above5day: data.S5FD_Above_5Day_MA ?? marketData.movingAverages.breadth.above5day,

            above50day: data.S5FI_Above_50Day_MA ?? marketData.movingAverages.breadth.above50day,
            above200day: data.S5TH_Above_200Day_MA ?? marketData.movingAverages.breadth.above200day,

          riskIndicators: {
            hySpread: data.HY_Spread ?? marketData.riskIndicators.hySpread,
            dxy:      data.DXY      ?? marketData.riskIndicators.dxy,
            goldSP:   data.Gold_SP_Ratio ?? marketData.riskIndicators.goldSP,
          },
        };
        setMarketData(newData);
        setLastImportDate(new Date());
        const missing = knownFields.length - foundFields.length;
        const msg = missing > 0
          ? `${foundFields.length} Felder importiert (${missing} nicht gefunden)`
          : 'CSV erfolgreich importiert';
        setCsvStatus({ type: 'success', msg });
        setTimeout(() => setCsvStatus(null), 4000);
        event.target.value = '';
      } catch (error) {
        setCsvStatus({ type: 'error', msg: 'Fehler beim Lesen der Datei — bitte Datei prüfen' });
        setTimeout(() => setCsvStatus(null), 4000);
      }
    };
    reader.readAsText(file);

  const f = (n, d = 1) => n.toFixed(d).replace('.', ',');

  const glass = {

  const metricValue = (color = '#F5F5F7') => ({ fontSize: '18px', fontWeight: 600, color, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' });

  // ── Anticyclical Volatility Classification ──
  // 5 classes: higher vola class = more fear = higher investment grade (anticyclical)
  const volaClasses = [
    { level: 1, label: 'Stille', color: '#8E8E93', investGrade: 'bis zu 40%', investPct: 40, investDesc: 'Markt zu ruhig — Complacency-Risiko' },
    { level: 2, label: 'Ruhe', color: '#30D158', investGrade: 'bis zu 60%', investPct: 60, investDesc: 'Geringes Stressniveau — Basis-Exposure' },
    { level: 3, label: 'Spannung', color: '#FFCC00', investGrade: 'bis zu 80%', investPct: 80, investDesc: 'Erhöhte Unsicherheit — selektiv aufbauen' },
    { level: 4, label: 'Stress', color: '#FF9F0A', investGrade: 'bis zu 90%', investPct: 90, investDesc: 'Deutlicher Stress — antizyklisch erhöhen' },
    { level: 5, label: 'Panik', color: '#FF453A', investGrade: 'bis zu 110%', investPct: 110, investDesc: 'Kapitulation — aggressiv investieren' },
  ];

  // Classify using config thresholds
  const classifyFromConfig = (key, value) => {
    const cfg = thresholds[key] ?? defaultThresholds[key];
    if (!cfg) return null;
    const [t1, t2, t3, t4] = cfg.values;
    if (cfg.dir === 'asc') {
      // ascending: value ≤ t1 → 1, ≤ t2 → 2, etc.
      return value <= t1 ? 1 : value <= t2 ? 2 : value <= t3 ? 3 : value <= t4 ? 4 : 5;
    } else {
      // descending: value ≥ t1 → 1, ≥ t2 → 2, etc.
      return value >= t1 ? 1 : value >= t2 ? 2 : value >= t3 ? 3 : value >= t4 ? 4 : 5;
    }
  };

  // Computed spreads

  // Individual indicator assessments
  const indicators = [

  // ── Tooltip helper ──

      >
        {children}

  // ── DATA TAB ──
  const DataView = () => (
    <>
      {/* Top row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px', marginBottom: '8px' }}>
        {/* Fear & Greed */}
        <div style={glass}>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(80px, 1fr))', gap: '4px' }}>

          {(() => {
            const allVals = [v.vix, v.vx1, v.vx2, v.vx3, v.vx4, v.vx5];

            const rawMax = Math.max(...allVals);
            const pad = (rawMax - rawMin) * 0.2 || 2;

                        }}

                          const raw = e.target.value.replace(',', '.');
                          const num = parseFloat(raw);
                          if (!isNaN(num)) {
                            // Apply value
                            setDraftThresholds(prev => {
                              const next = { ...prev };
                              next[key] = { ...next[key], values: next[key].values.map((v2, i2) => i2 === vi ? num : v2) };

                              setTimeout(() => validateAll(next), 0);
                              return next;
                            });
                          }
                          // Clear raw text → display formatted value
                          setInputTexts(prev => {
                            const copy = { ...prev };
                            delete copy[`${key}-${vi}`];

                    if (validateAll(draftThresholds)) {
                      setThresholds(JSON.parse(JSON.stringify(draftThresholds)));
                      setShowConfig(false);
                    }
                  }}
                  style={{
                    flex: 1, padding: '12px',
                    borderRadius: '12px', border: 'none', cursor: 'pointer',
                    background: Object.keys(validationErrors).length > 0 ? 'rgba(255,255,255,0.06)' : '#0A84FF',
                    color: Object.keys(validationErrors).length > 0 ? 'rgba(255,255,255,0.3)' : '#fff',
                    fontSize: '14px', fontWeight: 600,
                    transition: 'all 0.2s ease',
                  }}
                  onMouseEnter={e => { if (Object.keys(validationErrors).length === 0) e.currentTarget.style.opacity = '0.85'; }}
                  onMouseLeave={e => e.currentTarget.style.opacity = '1'}
                >
                  Aktualisieren
                </button>
              </div>
            </div>
          </div>
        )}

        {/* CSV Status Toast */}
        {csvStatus && (
          <div style={{
            marginBottom: '8px', padding: '10px 14px', borderRadius: '12px',
            background: csvStatus.type === 'success' ? 'rgba(48,209,88,0.08)' : 'rgba(255,69,58,0.08)',
            border: `0.5px solid ${csvStatus.type === 'success' ? 'rgba(48,209,88,0.2)' : 'rgba(255,69,58,0.2)'}`,
            fontSize: '11px', fontWeight: 500,
            color: csvStatus.type === 'success' ? '#30D158' : '#FF453A',
            display: 'flex', alignItems: 'center', gap: '8px',
          }}>
            <span>{csvStatus.type === 'success' ? '✓' : '⚠'} {csvStatus.msg}</span>
            <button onClick={() => setCsvStatus(null)} style={{
              marginLeft: 'auto', background: 'none', border: 'none',
              color: 'rgba(255,255,255,0.3)', cursor: 'pointer', fontSize: '14px', lineHeight: 1,
            }}>×</button>
          </div>
        )}

        {/* Tab Content */}
        {activeTab === 'data' ? <DataView /> : <AnalysisView />}

      </div>
    </div>
  );
};

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
